<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="CV ATS Enterprise Pro - Analisis CV massal dengan AI, TF-IDF, dan dashboard real-time">
    <title>CV ATS Enterprise Pro</title>
    <link rel="manifest" href="data:application/json,%7B%22name%22:%22CV%20ATS%20Enterprise%22,%22short_name%22:%22CV%20ATS%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22%23000%22,%22theme_color%22:%22%231f1f23%22,%22icons%22:%5B%7B%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns=%27http://www.w3.org/2000/svg%27%20viewBox=%270%200%20192%20192%27%3E%3Crect%20fill=%27%2310a37f%27%20width=%27192%27%20height=%27192%27/%3E%3Ctext%20x=%2750%25%27%20y=%2750%25%27%20font-size=%27100%27%20fill=%27white%27%20text-anchor=%27middle%27%20dominant-baseline=%27middle%27%20font-weight=%27bold%27%3ECV%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%22%7D%5D%7D">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --color-primary: #10a37f;
            --color-primary-dark: #0d8b68;
            --color-bg-dark: #0d0d0d;
            --color-bg-secondary: #1a1a1a;
            --color-bg-tertiary: #262626;
            --color-text-primary: #ffffff;
            --color-text-secondary: #b4b4b8;
            --color-text-tertiary: #808086;
            --color-border: #404040;
            --color-success: #4ade80;
            --color-warning: #fbbf24;
            --color-danger: #ef4444;
            --color-info: #60a5fa;
            --transition: all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
        }
        @media (prefers-color-scheme: light) {
            :root {
                --color-bg-dark: #ffffff;
                --color-bg-secondary: #f5f5f5;
                --color-bg-tertiary: #ebebf0;
                --color-text-primary: #0d0d0d;
                --color-text-secondary: #565869;
                --color-text-tertiary: #9c9ca6;
                --color-border: #d1d5db;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg-dark);
            color: var(--color-text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--color-border);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 600;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--color-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .theme-toggle {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .theme-toggle:hover {
            background: var(--color-bg-tertiary);
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 30px;
            margin-bottom: 40px;
        }
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        .upload-section {
            background: linear-gradient(135deg, rgba(16,163,127,0.1) 0%, rgba(96,165,250,0.05) 100%);
            border: 2px dashed var(--color-primary);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .upload-section:hover {
            background: linear-gradient(135deg, rgba(16,163,127,0.15) 0%, rgba(96,165,250,0.1) 100%);
            border-color: var(--color-primary);
        }
        .upload-section.dragging {
            background: linear-gradient(135deg, rgba(16,163,127,0.2) 0%, rgba(96,165,250,0.15) 100%);
            transform: scale(1.02);
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .upload-section h3 {
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }
        .upload-section p {
            color: var(--color-text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .btn {

            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            font-family: inherit;
        }
        .btn-primary {
            background: var(--color-primary);
            color: white;
            display: inline-block;
        }
        .btn-primary:hover {
            background: var(--color-primary-dark);
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: var(--color-bg-secondary);
            color: var(--color-text-primary);
            border: 1px solid var(--color-border);
        }
        .btn-secondary:hover {
            background: var(--color-bg-tertiary);
        }

            font-weight: 600;
            color: var(--color-text-secondary);

            display: flex;

            align-items: center;

            border-color: var(--color-primary);

            font-weight: 500;

        }
        .file-size {

            color: var(--color-text-secondary);
        }
        .file-status {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-pending {
            background: rgba(96, 165, 250, 0.2);
            color: var(--color-info);
        }
        .status-processing {
            background: rgba(251, 191, 36, 0.2);
            color: var(--color-warning);
        }
        .status-success {
            background: rgba(74, 222, 128, 0.2);
            color: var(--color-success);
        }
        .status-error {
            background: rgba(239, 68, 68, 0.2);
            color: var(--color-danger);
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            width: 90%;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal h3 {
            margin-bottom: 20px;
            color: var(--color-text-primary);
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--color-text-secondary);
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--color-border);
            border-top: 2px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 16px 20px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }
        .toast.success {
            border-left: 4px solid var(--color-success);
        }
        .toast.error {
            border-left: 4px solid var(--color-danger);
        }
        .toast.info {
            border-left: 4px solid var(--color-info);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-header h2 {
            font-size: 18px;
            color: var(--color-text-primary);
        }
        .input-file {
            display: none;
        }
        .export-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tag {
            display: inline-block;
            background: var(--color-bg-tertiary);
            color: var(--color-text-primary);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            margin: 4px 4px 4px 0;
        }
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            header {
                margin-bottom: 30px;
            }
            .main-grid {
                gap: 20px;
                margin-bottom: 30px;
            }
            .dashboard {
                grid-template-columns: 1fr;
            }
            .modal {
                width: 95%;
                padding: 20px;
            }
        }
    </style>
</head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfjs-dist/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

    <script>
        const state = {
            files: [],
            results: [],
            chart: null,
            processingQueue: [],
            isProcessing: false
        };

        const config = {
            aiEngine: 'tfidf',
            apiKey: '',
            proxyUrl: '',
            batchSize: 5,
            jobDesc: ''
        };

        // TF-IDF Implementation
        class TFIDF {
            constructor() {
                this.documents = [];
                this.vocab = new Map();
                this.idf = new Map();
            }

            addDocument(doc) {
                const tokens = this.tokenize(doc);
                this.documents.push(tokens);
                tokens.forEach(token => {
                    this.vocab.set(token, (this.vocab.get(token) || 0) + 1);
                });
            }

            tokenize(text) {
                return text.toLowerCase()
                    .replace(/[^\w\s]/g, '')
                    .split(/\s+/)
                    .filter(w => w.length > 2);
            }

            calculateTFIDF(query) {
                const queryTokens = this.tokenize(query);
                return this.documents.map((doc, idx) => {
                    let score = 0;
                    queryTokens.forEach(token => {
                        const count = doc.filter(t => t === token).length;
                        const tf = count / doc.length;
                        const idf = Math.log(this.documents.length / (this.documents.filter(d => d.includes(token)).length + 1));
                        score += tf * idf;
                    });
                    return { docIndex: idx, score: score * 100 };
                });
            }
        }

        // Initialize
        pdfjsWorker.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdfjs-dist/3.11.174/pdf.worker.min.js';

        // Theme Toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
            const isDark = document.documentElement.style.colorScheme === 'dark';
            document.documentElement.style.colorScheme = isDark ? 'light' : 'dark';
        });

        // File Input
        document.getElementById('browseBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', handleFiles);
        document.getElementById('uploadSection').addEventListener('dragover', (e) => {
            e.preventDefault();
            document.getElementById('uploadSection').classList.add('dragging');
        });

        document.getElementById('uploadSection').addEventListener('dragleave', () => {
            document.getElementById('uploadSection').classList.remove('dragging');
        });

        document.getElementById('uploadSection').addEventListener('drop', (e) => {
            e.preventDefault();
            document.getElementById('uploadSection').classList.remove('dragging');
            handleFiles({ target: { files: e.dataTransfer.files } });
        });

        function handleFiles(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (file.name.endsWith('.zip')) {
                    extractZip(file);
                } else if (file.type === 'application/pdf' || file.name.endsWith('.docx')) {
                    addFileToQueue(file);
                }
            });
            updateUI();
        }

        function addFileToQueue(file) {
            state.files.push({
                id: Math.random().toString(36),
                name: file.name,
                file: file,
                size: (file.size / 1024).toFixed(2),
                status: 'pending',
                result: null
            });
        }

        async function extractZip(zipFile) {
            try {
                const zip = await JSZip.loadAsync(zipFile);
                for (const [path, file] of Object.entries(zip.files)) {
                    if (!file.dir && (path.endsWith('.pdf') || path.endsWith('.docx'))) {
                        const blob = await file.async('blob');
                        const newFile = new File([blob], file.name, { type: blob.type });
                        addFileToQueue(newFile);
                    }
                }
                showToast(`Extracted ${state.files.length} files from ZIP`, 'success');
            } catch (err) {
                showToast('Failed to extract ZIP: ' + err.message, 'error');
            }
        }

        async function extractTextFromPDF(file) {
            const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
            let text = '';
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(item => item.str).join(' ') + '\n';
            }
            return text;
        }

        async function extractTextFromDocx(file) {
            const result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
            return result.value;
        }

        async function extractCVData(text) {
            const data = {
                name: '',
                age: '',
                experience: '',
                skills: [],
                education: [],
                rawText: text
            };

            // Simple regex extraction
            const nameMatch = text.match(/^([A-Za-z\s]{2,})/m);
            data.name = nameMatch ? nameMatch[1].trim() : 'Unknown';

            const expMatch = text.match(/(\d+)\s*(?:year|tahun|yr)/i);
            data.experience = expMatch ? expMatch[1] + ' years' : '0 years';

            const skillsMatch = text.match(/(?:skill|keahlian|proficiency)[:\s]*([^,\n.]+(?:,[^,\n.]+)*)/i);
            if (skillsMatch) {
                data.skills = skillsMatch[1].split(',').map(s => s.trim()).slice(0, 5);
            }

            const eduMatch = text.match(/(?:education|degree|pendidikan)[:\s]*([A-Za-z\s,]+)/i);
            data.education = eduMatch ? [eduMatch[1].trim()] : [];

            return data;
        }

        async function analyzeCV(fileObj) {
            try {
                fileObj.status = 'processing';
                updateUI();

                let text = '';
                if (fileObj.file.type === 'application/pdf') {
                    text = await extractTextFromPDF(fileObj.file);
                } else {
                    text = await extractTextFromDocx(fileObj.file);
                }

                const cvData = await extractCVData(text);

                let score = 0;
                if (config.aiEngine === 'tfidf' && config.jobDesc) {
                    const tfidf = new TFIDF();
                    tfidf.addDocument(text);
                    tfidf.addDocument(config.jobDesc);
                    const results = tfidf.calculateTFIDF(config.jobDesc);
                    score = Math.min(100, results[0]?.score || 0);
                } else if (config.apiEngine !== 'tfidf' && config.apiKey) {
                    score = await callAIAPI(text);
                } else {
                    score = Math.random() * 100;
                }

                fileObj.result = {
                    ...cvData,
                    score: Math.round(score),
                    timestamp: new Date().toISOString()
                };

                state.results.push(fileObj.result);
                fileObj.status = 'success';

            } catch (err) {
                console.error(err);
                fileObj.status = 'error';
                showToast(`Error processing ${fileObj.name}: ${err.message}`, 'error');
            }

            updateUI();
        }

        async function callAIAPI(text) {
            const endpoint = config.proxyUrl || getDefaultEndpoint();
            const payload = {
                engine: config.aiEngine,
                apiKey: config.apiKey,
                text: text,
                jobDesc: config.jobDesc
            };

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                return data.score || 0;
            } catch (err) {
                console.error('API Error:', err);
                return 0;
            }
        }

        function getDefaultEndpoint() {
            return '/api/analyze-cv';
        }

        async function startProcessing() {
            if (state.files.length === 0) {
                showToast('No files to process', 'info');
                return;
            }

            state.isProcessing = true;
            updateUI();

            for (const file of state.files) {
                if (file.status === 'pending') {
                    await analyzeCV(file);
                }
            }

            state.isProcessing = false;
            updateChart();
            showToast('Analysis complete!', 'success');
            updateUI();
        }

        function updateUI() {
            // Update stats
            document.getElementById('totalFiles').textContent = state.files.length;
            document.getElementById('processedCount').textContent = state.files.filter(f => f.status === 'success').length;
            document.getElementById('processingCount').textContent = state.files.filter(f => f.status === 'processing').length;

            const avgScore = state.results.length > 0
                ? (state.results.reduce((sum, r) => sum + r.score, 0) / state.results.length).toFixed(1)
                : 0;
            document.getElementById('avgScore').textContent = avgScore;

            // Update file list
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = state.files.map(f => `
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">${f.name}</div>
                        <div class="file-size">${f.size} KB</div>
                    </div>
                    <div class="file-status">
                        ${f.result ? `<span class="score-badge ${f.result.score >= 70 ? 'score-high' : f.result.score >= 40 ? 'score-medium' : 'score-low'}">${f.result.score}</span>` : ''}
                        <span class="status-badge status-${f.status}">${f.status}</span>
                        ${f.result ? `<button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="showPreview('${f.id}')">Preview</button>` : ''}
                    </div>
                </div>
            `).join('');

            // Update table
            const topCandidates = state.results.sort((a, b) => b.score - a.score).slice(0, 10);
            const tableBody = document.getElementById('candidateTable');
            tableBody.innerHTML = topCandidates.length > 0 ? topCandidates.map(r => `
                <tr>
                    <td><strong>${r.name}</strong></td>
                    <td><span class="score-badge ${r.score >= 70 ? 'score-high' : r.score >= 40 ? 'score-medium' : 'score-low'}">${r.score}</span></td>
                    <td>${r.experience}</td>
                    <td>${r.skills.slice(0, 2).map(s => `<span class="tag">${s}</span>`).join('')}</td>
                    <td><button class="btn btn-secondary" style="padding: 4px 8px; font-size: 11px;">View</button></td>
                </tr>
            `).join('') : '<tr><td colspan="5" style="text-align: center; color: var(--color-text-secondary); padding: 40px;">No data yet</td></tr>';

            // Update buttons
            const hasFiles = state.files.length > 0;
            document.getElementById('startProcess').disabled = !hasFiles || state.isProcessing;
            document.getElementById('exportExcel').disabled = state.results.length === 0;
            document.getElementById('exportPdf').disabled = state.results.length === 0;

            // Update config
            config.aiEngine = document.getElementById('aiEngine').value;
            config.apiKey = document.getElementById('apiKey').value;
            config.proxyUrl = document.getElementById('proxyUrl').value;
            config.batchSize = parseInt(document.getElementById('batchSize').value);
            config.jobDesc = document.getElementById('jobDesc').value;
        }

        function updateChart() {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            const scores = state.results.map(r => r.score);
            const bins = [0, 20, 40, 60, 80, 100];
            const distribution = bins.map((_, i) => {
                const min = bins[i];
                const max = bins[i + 1];
                return scores.filter(s => s >= min && s < max).length;
            });

            if (state.chart) state.chart.destroy();

            state.chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['0-20', '20-40', '40-60', '60-80', '80-100'],
                    datasets: [{
                        label: 'Candidates',
                        data: distribution,
                        backgroundColor: '#10a37f',
                        borderColor: '#0d8b68',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: 'var(--color-text-secondary)' },
                            grid: { color: 'var(--color-border)' }
                        },
                        x: {
                            ticks: { color: 'var(--color-text-secondary)' },
                            grid: { color: 'var(--color-border)' }
                        }
                    }
                }
            });
        }

        function showPreview(fileId) {
            const fileObj = state.files.find(f => f.id === fileId);
            if (!fileObj || !fileObj.result) return;

            const modal = document.getElementById('previewModal');
            const content = document.getElementById('previewContent');
            const result = fileObj.result;

            content.innerHTML = `
                <div style="color: var(--color-text-primary);">
                    <h4>${result.name}</h4>
                    <p><strong>Score:</strong> <span class="score-badge ${result.score >= 70 ? 'score-high' : result.score >= 40 ? 'score-medium' : 'score-low'}">${result.score}</span></p>
                    <p><strong>Experience:</strong> ${result.experience}</p>
                    <p><strong>Skills:</strong> ${result.skills.map(s => `<span class="tag">${s}</span>`).join('')}</p>
                    <p><strong>Education:</strong> ${result.education.join(', ')}</p>
                    <hr style="border: none; border-top: 1px solid var(--color-border); margin: 20px 0;">
                    <p style="font-size: 12px; color: var(--color-text-secondary); max-height: 200px; overflow-y: auto;">${result.rawText.substring(0, 500)}...</p>
                </div>
            `;

            modal.classList.add('active');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.remove('active');
        }

        function exportToExcel() {
            const ws_data = state.results.map(r => ({
                Name: r.name,
                Score: r.score,
                Experience: r.experience,
                Skills: r.skills.join('; '),
                Education: r.education.join('; ')
            }));

            const ws = XLSX.utils.json_to_sheet(ws_data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'CVs');
            XLSX.writeFile(wb, `cv-analysis-${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        async function exportToPDF() {
            const { PDFDocument, rgb } = PDFLib;
            const pdfDoc = await PDFDocument.create();
            const page = pdfDoc.addPage([600, 800]);
            const { height } = page.getSize();

            page.drawText('CV ATS Analysis Report', {
                x: 50,
                y: height - 50,
                size: 20,
                color: rgb(0.06, 0.64, 0.50)
            });

            let yOffset = height - 100;
            state.results.slice(0, 10).forEach((result, idx) => {
                if (yOffset < 100) {
                    pdfDoc.addPage([600, 800]);
                    yOffset = 750;
                }

                page.drawText(`${idx + 1}. ${result.name} - Score: ${result.score}`, {
                    x: 50,
                    y: yOffset,
                    size: 12,
                    color: rgb(0, 0, 0)
                });

                yOffset -= 25;
            });

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cv-analysis-${new Date().toISOString().split('T')[0]}.pdf`;
            a.click();
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Event Listeners
        document.getElementById('startProcess').addEventListener('click', startProcessing);
        document.getElementById('exportExcel').addEventListener('click', exportToExcel);
        document.getElementById('exportPdf').addEventListener('click', exportToPDF);
        document.getElementById('aiEngine').addEventListener('change', (e) => {
            config.aiEngine = e.target.value;
        });

        // Close modal on click outside
        document.getElementById('previewModal').addEventListener('click', (e) => {
            if (e.target.id === 'previewModal') closePreview();
        });

        // Service Worker for PWA
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', () => self.skipWaiting());
                self.addEventListener('activate', () => self.clients.claim());
                self.addEventListener('fetch', (e) => {
                    if (e.request.method === 'GET') {
                        e.respondWith(caches.open('v1').then(cache => cache.match(e.request).then(res => res || fetch(e.request))));
                    }
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(() => {});
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
