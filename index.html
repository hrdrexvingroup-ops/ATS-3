<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rexvin CV Screener - Pro Stable Edition 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); }
        .table-container { overflow-x: auto; background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto space-y-6">
        <!-- HEADER UPGRADE -->
        <div class="bg-gradient-to-r from-blue-600 to-emerald-600 p-8 rounded-3xl text-white shadow-2xl text-center">
            <h1 class="text-4xl font-black tracking-tight mb-2">REXVIN <span class="text-yellow-300">CV AI</span></h1>
            <p class="text-blue-100 text-lg opacity-90">Pro Stable Edition • 100% Success Rate • 2026 Ready</p>
        </div>

        <!-- FORM (ASLI + MODEL SELECT) -->
        <div class="bg-white/90 backdrop-blur-sm p-8 rounded-3xl shadow-xl border border-white/50">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-black text-slate-900">Quick Setup</h2>
                    <p class="text-slate-500">Upload → Analyze → Export</p>
                </div>
                <button onclick="clearResults()" class="bg-rose-100 hover:bg-rose-200 text-rose-700 px-6 py-2 rounded-xl font-bold text-sm transition-all">Clear</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">🔑 Groq API Key</label>
                        <input type="password" id="apiKey" class="w-full p-4 bg-slate-50 border rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition shadow-sm" placeholder="gsk_...">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">🤖 Model</label>
                        <select id="modelSelect" class="w-full p-4 bg-slate-50 border rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none shadow-sm">
                            <option value="llama-3.3-70b-versatile">Llama 3.3 70B ⭐</option>
                            <option value="llama3-70b-8192">Llama 3 70B ⚡</option>
                            <option value="mixtral-8x7b-32768">Mixtral 8x7B 🧠</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">📁 CV Files</label>
                        <input type="file" id="fileInput" multiple class="w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:text-sm file:font-bold file:bg-gradient-to-r file:from-blue-50 file:to-emerald-50 file:text-blue-700 hover:file:from-blue-100 hover:file:to-emerald-100">
                        <div id="fileInfo" class="text-xs text-slate-500 mt-1"></div>
                    </div>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">📋 Job Description</label>
                    <textarea id="jobDesc" rows="4" class="w-full p-4 bg-slate-50 border rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm shadow-sm" placeholder="WAJIB pengalaman Developer/Property 2+ tahun..."></textarea>
                </div>
            </div>

            <button onclick="processFiles()" id="btnRun" class="mt-8 w-full bg-gradient-to-r from-blue-600 to-emerald-600 hover:from-blue-700 hover:to-emerald-700 text-white font-black py-5 rounded-2xl shadow-xl transition-all text-lg">
                🚀 MULAI ANALISA BATCH
            </button>
            
            <div id="progressBox" class="hidden mt-8 p-6 bg-blue-50 border-2 border-blue-200 rounded-2xl shadow-lg">
                <div class="flex justify-between mb-3">
                    <span id="statusLabel" class="font-bold text-blue-700 flex items-center gap-2">
                        <div class="w-5 h-5 bg-blue-500 rounded-full animate-spin"></div>
                        Processing...
                    </span>
                    <span id="progressText" class="font-bold text-blue-700 bg-blue-200 px-3 py-1 rounded-xl">0/0</span>
                </div>
                <div class="w-full bg-slate-200 h-3 rounded-xl overflow-hidden">
                    <div id="progressBar" class="bg-gradient-to-r from-blue-600 to-emerald-600 h-full w-0 transition-all duration-1000"></div>
                </div>
            </div>
        </div>

        <!-- TABLE (ASLI + STATS) -->
        <div class="table-container">
            <div class="p-6 bg-gradient-to-r from-slate-800 to-slate-900 text-white rounded-t-3xl">
                <div class="flex justify-between items-center">
                    <h3 class="text-xl font-black">Hasil Analisa <span id="totalCount" class="text-emerald-300">(0 CV)</span></h3>
                    <div>
                        <button onclick="downloadExcel()" id="btnDownload" class="hidden bg-emerald-600 hover:bg-emerald-700 px-6 py-2 rounded-xl font-bold flex items-center gap-2 mr-3">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10l-5.5 5.5m0 0L12 21l5.5-5.5m-5.5 5.5V8a2 2 0 012-2h2.5"/></svg>
                            Excel
                        </button>
                        <button onclick="sortTable()" class="bg-slate-700 hover:bg-slate-600 px-6 py-2 rounded-xl font-bold flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6M3 16h4"/></svg>
                            Sort
                        </button>
                    </div>
                </div>
            </div>
            <table class="w-full text-left border-collapse min-w-[1200px]">
                <thead>
                    <tr class="bg-slate-800/50 text-white text-xs uppercase tracking-wider font-black backdrop-blur-sm">
                        <th class="p-4 border-r border-slate-700 w-48 sticky left-0 z-10">Nama & Kontak</th>
                        <th class="p-4 border-r border-slate-700 text-center w-20">Usia</th>
                        <th class="p-4 border-r border-slate-700 w-48">Domisili & Edukasi</th>
                        <th class="p-4 border-r border-slate-700">Pengalaman</th>
                        <th class="p-4 border-r border-slate-700 w-64">Catatan</th>
                        <th class="p-4 border-r border-slate-700 text-center w-40">Rekomendasi</th>
                        <th class="p-4 text-center w-20 sticky right-0 z-10">Score</th>
                    </tr>
                </thead>
                <tbody id="resultTable" class="text-sm divide-y divide-slate-200">
                </tbody>
            </table>
            <div id="emptyState" class="p-20 text-center text-slate-400">
                <div class="text-5xl mb-4">📊</div>
                Upload CV untuk mulai analisa...
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let allResults = [];

        // ASLI processFiles + MINIMAL ENHANCEMENT
        async function processFiles() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const jd = document.getElementById('jobDesc').value.trim();
            const model = document.getElementById('modelSelect').value;
            const files = Array.from(document.getElementById('fileInput').files);
            
            if(!apiKey || !jd || files.length === 0) {
                return alert("⛔ Lengkapi API Key, JD, dan CV!");
            }

            allResults = [];
            document.getElementById('resultTable').innerHTML = "";
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('progressBox').classList.remove('hidden');
            document.getElementById('btnRun').disabled = true;
            document.getElementById('btnDownload').classList.add('hidden');

            for (let i = 0; i < files.length; i++) {
                updateProgress(i + 1, files.length, `Analisa: ${files[i].name}`);
                
                try {
                    const text = files[i].name.toLowerCase().endsWith('.pdf') ? 
                        await extractPDF(files[i]) : 
                        await extractDocx(files[i]);
                    
                    // SAFE CLEAN (ASLI + NULL CHECK)
                    const cleanText = text ? 
                        text.replace(/[^\x00-\x7F]/g, "").replace(/\s+/g, " ").trim() : 
                        "TEXT EMPTY";
                    
                    if (cleanText.length < 50) {
                        throw new Error("Text terlalu pendek - coba DOCX");
                    }
                    
                    const aiResult = await callGroq(apiKey, jd, cleanText, model);
                    allResults.push(aiResult);
                    renderRow(aiResult);
                    
                } catch (e) {
                    console.error(`Error ${files[i].name}:`, e);
                    // ERROR ROW (NEW)
                    const errorResult = {
                        name: files[i].name,
                        usia: "ERROR",
                        hp: "",
                        email: "",
                        domisili: "",
                        pendidikan: "",
                        pengalaman: "",
                        catatan: e.message || "Unknown error",
                        rekomendasi: "FILE ERROR",
                        score: 0
                    };
                    allResults.push(errorResult);
                    renderRow(errorResult);
                }
                
                // ASLI RATE LIMIT (3 detik)
                if (i % 3 === 0 && i > 0) {
                    await new Promise(r => setTimeout(r, 3000));
                }
            }

            updateProgress(files.length, files.length, "✅ Selesai!");
            document.getElementById('btnRun').disabled = false;
            document.getElementById('btnDownload').classList.remove('hidden');
            sortTable();
            updateStats();
        }

        // ASLI callGroq + MODEL SUPPORT
        async function callGroq(key, jd, cv, model = "llama-3.3-70b-versatile") {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: model,
                    messages: [
                        { 
                            role: "system", 
                            content: `Senior HR Auditor 2026. JSON SAJA!

1. Usia di 2026
2. Nama/HP/Email/Domisili/Pendidikan  
3. Pengalaman TOP 3 (match JD)
4. REKOMENDASI: 
   "TIDAK DISARANKAN" + score<50 jika WAJIB tidak ada
   "SANGAT DISARANKAN" + score 80+ jika perfect

JSON: {"name":"","usia":"","hp":"","email":"","domisili":"","pendidikan":"","pengalaman":"","catatan":"","rekomendasi":"","score":0}`
                        },
                        { role: "user", content: `JD: ${jd}\nCV: ${cv.substring(0, 6500)}` }
                    ],
                    response_format: { type: "json_object" },
                    temperature: 0.1
                })
            });
            
            const data = await res.json();
            
            // SAFE PARSE
            try {
                return JSON.parse(data.choices[0].message.content);
            } catch (e) {
                console.error('JSON Parse Error:', data.choices[0].message.content);
                throw new Error('AI response invalid');
            }
        }

        // ASLI extract (STABIL)
        async function extractPDF(file) {
            try {
                const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
                let text = "";
                const maxPages = Math.min(pdf.numPages, 8); // Limit pages
                for (let i = 1; i <= maxPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(s => s.str || '').join(" ") + " ";
                }
                return text.trim() || "NO TEXT";
            } catch (e) {
                console.error('PDF Error:', e);
                return `PDF ERROR: ${e.message}`;
            }
        }

        async function extractDocx(file) {
            try {
                const res = await mammoth.extractRawText({arrayBuffer: await file.arrayBuffer()});
                return (res.value || '').trim() || "NO TEXT";
            } catch (e) {
                console.error('DOCX Error:', e);
                return `DOCX ERROR: ${e.message}`;
            }
        }

        // ENHANCED renderRow (dukung ERROR)
        function renderRow(d) {
            const isError = d.rekomendasi === 'FILE ERROR' || d.score === 'ERROR';
            const scoreColor = isError ? 'text-rose-600 bg-rose-50 border-2 border-rose-300' : 
                (d.score >= 80 ? 'text-emerald-600 bg-emerald-50' : 
                 d.score >= 60 ? 'text-amber-600 bg-amber-50' : 'text-rose-600 bg-rose-50');
            const recColor = isError ? 'text-rose-700 bg-rose-100 border border-rose-300' : 
                (d.rekomendasi?.includes("TIDAK") ? 'text-rose-700 bg-rose-100' : 'text-emerald-700 bg-emerald-100');
            
            const html = `
                <tr class="hover:bg-slate-50 transition-all ${isError ? 'bg-rose-50 border-l-4 border-rose-400' : ''}">
                    <td class="p-4 border-r font-semibold">
                        <div class="font-bold text-slate-900">${d.name || 'N/A'}</div>
                        <div class="text-xs text-slate-500">${d.hp || ''}</div>
                        <div class="text-xs text-slate-400">${d.email || ''}</div>
                    </td>
                    <td class="p-4 border-r text-center font-bold ${isError ? 'text-rose-600' : ''}">${d.usia || 'N/A'}</td>
                    <td class="p-4 border-r">
                        <div class="font-semibold">${d.domisili || 'N/A'}</div>
                        <div class="text-xs text-slate-500 italic">${d.pendidikan || ''}</div>
                    </td>
                    <td class="p-4 border-r">${d.pengalaman || ''}</td>
                    <td class="p-4 border-r italic text-slate-600">${d.catatan || ''}</td>
                    <td class="p-4 border-r text-center">
                        <span class="px-3 py-2 rounded-full font-bold text-xs uppercase ${recColor} shadow-sm">${d.rekomendasi || 'N/A'}</span>
                    </td>
                    <td class="p-4 text-center">
                        <span class="px-3 py-2 rounded-xl font-black ${scoreColor} shadow-md">${isError ? 'ERROR' : d.score + '%'}</span>
                    </td>
                </tr>`;
            document.getElementById('resultTable').insertAdjacentHTML('beforeend', html);
        }

        // NEW UTILITIES
        function updateProgress(c, t, l) {
            const p = (c/t)*100;
            document.getElementById('progressBar').style.width = p+'%';
            document.getElementById('progressText').innerText = `${c}/${t}`;
            document.getElementById('statusLabel').innerText = l;
        }

        function sortTable() {
            const tbody = document.getElementById('resultTable');
            Array.from(tbody.rows)
                .sort((a,b) => {
                    const sa = parseInt(a.cells[6].textContent) || 0;
                    const sb = parseInt(b.cells[6].textContent) || 0;
                    return sb - sa;
                })
                .forEach(row => tbody.appendChild(row));
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = `(${allResults.length} CV)`;
        }

        function clearResults() {
            if(confirm('Clear semua hasil?')) {
                allResults = [];
                document.getElementById('resultTable').innerHTML = '';
                document.getElementById('emptyState').classList.remove('hidden');
                document.getElementById('btnDownload').classList.add('hidden');
            }
        }

        function downloadExcel() {
            const ws = XLSX.utils.json_to_sheet(allResults);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "CV_Results");
            XLSX.writeFile(wb, `Rexvin_CV_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        // FILE INFO
        document.getElementById('fileInput').addEventListener('change', e => {
            const files = e.target.files;
            const totalMB = Array.from(files).reduce((a,b)=>a+b.size,0)/1024/1024;
            document.getElementById('fileInfo').textContent = `${files.length} file (${totalMB.toFixed(1)}MB)`;
        });

        updateStats();
    </script>
</body>
</html>
