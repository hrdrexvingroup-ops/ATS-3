<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Screening CV - Intellectual Sparring Edition</title>
    <style>
        :root { --primary: #2c3e50; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: #f4f7f6; color: var(--primary); }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        textarea { width: 100%; height: 250px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; resize: none; box-sizing: border-box; }
        button { background: var(--primary); color: white; padding: 15px 25px; border: none; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }
        button:hover { opacity: 0.9; }
        #result { margin-top: 25px; padding: 20px; border-radius: 4px; display: none; }
        .pass { background: #d4edda; border-left: 10px solid var(--success); }
        .fail { background: #f8d7da; border-left: 10px solid var(--danger); }
        .analysis-box { margin-top: 10px; font-size: 0.9em; }
        .highlight { font-weight: bold; color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 CV Scrutinizer: JD-Driven Logic</h2>
    <p>Sistem ini akan mengunci persyaratan <strong>Must-Have</strong> dari JD. Jika industri tidak cocok, skor akan dipangkas secara brutal.</p>
    
    <div class="grid">
        <div>
            <label><strong>1. Input Job Description (The Law)</strong></label>
            <textarea id="jdInput" placeholder="Contoh: Harus berpengalaman di Property Developer, menguasai STB, Penanganan Komplain, Minimal S1 Teknik Sipil..."></textarea>
        </div>
        <div>
            <label><strong>2. Input CV Kandidat (The Evidence)</strong></label>
            <textarea id="cvInput" placeholder="Tempel teks CV kandidat di sini..."></textarea>
        </div>
    </div>

    <button onclick="analyzeCV()">UJI KELAYAKAN KANDIDAT</button>

    <div id="result">
        <h3 id="statusTitle">Hasil Analisis</h3>
        <div id="scoreMetric" style="font-size: 1.5em; font-weight: bold;"></div>
        <div id="analysisDetail" class="analysis-box"></div>
    </div>
</div>

<script>
function analyzeCV() {
    const jd = document.getElementById('jdInput').value.toLowerCase();
    const cv = document.getElementById('cvInput').value.toLowerCase();
    const resultDiv = document.getElementById('result');
    const analysisDetail = document.getElementById('analysisDetail');
    const scoreMetric = document.getElementById('scoreMetric');

    if (!jd || !cv) { alert("Harap isi JD dan CV!"); return; }

    // --- TAHAP 1: EKSTRAKSI MUST-HAVE (LOGIKA DIKTATOR) ---
    // Mencari kata kunci industri secara otomatis dari JD
    const industryKeywords = ['property', 'developer', 'real estate', 'perumahan'];
    let requiredIndustry = industryKeywords.find(word => jd.includes(word)) || "";
    
    // --- TAHAP 2: PROXIMITY & CONTEXT CHECK ---
    let industryMatch = false;
    if (requiredIndustry) {
        // Cek apakah industri tersebut ada di bagian pengalaman kerja (asumsi teks panjang)
        industryMatch = cv.includes(requiredIndustry);
    }

    // --- TAHAP 3: PEMBOBOTAN DINAMIS ---
    let score = 0;
    let logs = [];

    // A. Filter Industri (Bobot 50% - Critical)
    if (industryMatch) {
        score += 50;
        logs.push("✅ INDUSTRI: Cocok (" + requiredIndustry.toUpperCase() + ")");
    } else {
        logs.push("<span class='highlight'>❌ INDUSTRI: GAGAL. Tidak ditemukan latar belakang " + (requiredIndustry || "spesifik") + " di CV.</span>");
    }

    // B. Kata Kerja Operasional (Bobot 30%)
    const operationalKeywords = ['stb', 'serah terima', 'komplain', 'monitoring rab', 'budget control'];
    let opMatchCount = 0;
    operationalKeywords.forEach(kw => {
        if (jd.includes(kw) && cv.includes(kw)) {
            opMatchCount++;
            score += (30 / operationalKeywords.length);
        }
    });
    logs.push("📊 Skill Operasional: " + opMatchCount + " dari " + operationalKeywords.filter(k => jd.includes(k)).length + " kriteria cocok.");

    // C. Persyaratan Teknis/Edukasi (Bobot 20%)
    if (jd.includes("s1") && cv.includes("s1")) score += 10;
    if (jd.includes("sipil") && cv.includes("sipil")) score += 10;
    logs.push("🎓 Edukasi/Teknis: Dicek berdasarkan kriteria minimal.");

    // --- TAHAP 4: KEPUTUSAN AKHIR ---
    resultDiv.style.display = "block";
    
    // Jika Industri Gagal, Skor tidak boleh lebih dari 40 (Auto-Reject)
    if (!industryMatch && score > 40) score = 40;

    scoreMetric.innerText = "SKOR AKURASI: " + Math.round(score) + "%";
    analysisDetail.innerHTML = "<ul><li>" + logs.join("</li><li>") + "</li></ul>";

    if (score >= 75) {
        resultDiv.className = "pass";
        document.getElementById('statusTitle').innerText = "STATUS: LAYAK INTERVIEW";
    } else {
        resultDiv.className = "fail";
        document.getElementById('statusTitle').innerText = "STATUS: TIDAK LAYAK (REJECT)";
    }
}
</script>

</body>
</html>
