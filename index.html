<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="CV ATS Enterprise Pro - Analisis CV massal dengan AI">
    <title>CV ATS Enterprise Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --color-primary: #10a37f;
            --color-primary-dark: #0d8b68;
            --color-bg-dark: #0d0d0d;
            --color-bg-secondary: #1a1a1a;
            --color-bg-tertiary: #262626;
            --color-text-primary: #ffffff;
            --color-text-secondary: #b4b4b8;
            --color-border: #404040;
            --color-success: #4ade80;
            --color-warning: #fbbf24;
            --color-danger: #ef4444;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --color-bg-dark: #ffffff;
                --color-bg-secondary: #f5f5f5;
                --color-bg-tertiary: #ebebf0;
                --color-text-primary: #0d0d0d;
                --color-text-secondary: #565869;
                --color-border: #d1d5db;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg-dark);
            color: var(--color-text-primary);
            line-height: 1.6;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--color-border);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 600;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--color-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 30px;
            margin-bottom: 40px;
        }
        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        .upload-section {
            background: linear-gradient(135deg, rgba(16,163,127,0.1) 0%, rgba(96,165,250,0.05) 100%);
            border: 2px dashed var(--color-primary);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-section:hover {
            background: linear-gradient(135deg, rgba(16,163,127,0.15) 0%, rgba(96,165,250,0.1) 100%);
        }
        .upload-section.dragging {
            transform: scale(1.02);
            background: linear-gradient(135deg, rgba(16,163,127,0.2) 0%, rgba(96,165,250,0.15) 100%);
        }
        .upload-section h3 {
            margin-bottom: 8px;
        }
        .upload-section p {
            color: var(--color-text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--color-primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--color-primary-dark);
        }
        .btn-secondary {
            background: var(--color-bg-secondary);
            color: var(--color-text-primary);
            border: 1px solid var(--color-border);
        }
        .btn-secondary:hover {
            background: var(--color-bg-tertiary);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .config-section {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            color: var(--color-text-primary);
            font-family: inherit;
            font-size: 13px;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(16,163,127,0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: var(--color-primary);
        }
        .stat-label {
            font-size: 12px;
            color: var(--color-text-secondary);
            text-transform: uppercase;
        }
        .content-main {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .chart-container {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 20px;
            height: 300px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .section-header h2 {
            font-size: 18px;
        }
        .file-item {
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .file-item:hover {
            border-color: var(--color-primary);
        }
        .file-info {
            flex: 1;
        }
        .file-name {
            font-weight: 500;
            margin-bottom: 4px;
        }
        .file-size {
            font-size: 12px;
            color: var(--color-text-secondary);
        }
        .file-status {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-pending {
            background: rgba(96, 165, 250, 0.2);
            color: var(--color-primary);
        }
        .status-success {
            background: rgba(74, 222, 128, 0.2);
            color: var(--color-success);
        }
        .status-error {
            background: rgba(239, 68, 68, 0.2);
            color: var(--color-danger);
        }
        .score-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .score-high {
            background: rgba(74, 222, 128, 0.2);
            color: var(--color-success);
        }
        .score-medium {
            background: rgba(251, 191, 36, 0.2);
            color: var(--color-warning);
        }
        .score-low {
            background: rgba(239, 68, 68, 0.2);
            color: var(--color-danger);
        }
        .table-container {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }
        .table-container table {
            width: 100%;
            border-collapse: collapse;
        }
        .table-container th {
            text-align: left;
            padding: 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text-secondary);
            border-bottom: 1px solid var(--color-border);
        }
        .table-container td {
            padding: 12px;
            border-bottom: 1px solid var(--color-border);
            font-size: 13px;
        }
        .table-container tr:hover {
            background: var(--color-bg-tertiary);
        }
        .tag {
            display: inline-block;
            background: var(--color-bg-tertiary);
            color: var(--color-text-primary);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            margin: 4px 4px 4px 0;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 16px 20px;
            z-index: 2000;
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-file {
            display: none;
        }
        .export-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">📄</div>
                <div>CV ATS Enterprise</div>
            </div>
        </header>

        <div class="main-grid">
            <div class="upload-section" id="uploadSection">
                <div style="font-size: 48px; margin-bottom: 16px;">📤</div>
                <h3>Upload CV</h3>
                <p>Drag & drop atau klik browse<br><small>(PDF, DOCX, ZIP)</small></p>
                <button class="btn btn-primary" id="browseBtn">Browse Files</button>
                <input type="file" id="fileInput" class="input-file" multiple accept=".pdf,.docx,.zip">
                
                <div class="config-section">
                    <h4>⚙️ Konfigurasi</h4>
                    <div class="form-group">
                        <label>AI Engine</label>
                        <select id="aiEngine">
                            <option value="tfidf">TF-IDF (Offline, Fast)</option>
                            <option value="groq">Groq API</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Job Description (untuk matching)</label>
                        <textarea id="jobDesc" placeholder="Paste job description..."></textarea>
                    </div>
                </div>
            </div>

            <div class="content-main">
                <div class="dashboard">
                    <div class="stat-card">
                        <div>
                            <div class="stat-label">Total Files</div>
                            <div class="stat-value" id="totalFiles">0</div>
                        </div>
                        <div style="font-size: 32px;">📁</div>
                    </div>
                    <div class="stat-card">
                        <div>
                            <div class="stat-label">Processed</div>
                            <div class="stat-value" id="processedCount">0</div>
                        </div>
                        <div style="font-size: 32px;">✅</div>
                    </div>
                    <div class="stat-card">
                        <div>
                            <div class="stat-label">Avg Score</div>
                            <div class="stat-value" id="avgScore">0</div>
                        </div>
                        <div style="font-size: 32px;">📊</div>
                    </div>
                </div>

                <div class="chart-container">
                    <h3 style="margin-bottom: 20px;">Score Distribution</h3>
                    <canvas id="scoreChart"></canvas>
                </div>

                <div>
                    <div class="section-header">
                        <h2>📋 File Queue</h2>
                        <div class="export-buttons">
                            <button class="btn btn-secondary" id="startProcess" disabled>▶️ Start Analysis</button>
                            <button class="btn btn-secondary" id="exportExcel" disabled>📊 Export Excel</button>
                        </div>
                    </div>
                    <div id="fileList" style="max-height: 400px; overflow-y: auto;"></div>
                </div>

                <div>
                    <div class="section-header">
                        <h2>🏆 Top Candidates</h2>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Score</th>
                                    <th>Experience</th>
                                    <th>Skills</th>
                                </tr>
                            </thead>
                            <tbody id="candidateTable">
                                <tr><td colspan="4" style="text-align: center; color: var(--color-text-secondary); padding: 40px;">No data yet</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfjs-dist/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        // Setup PDF worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdfjs-dist/3.11.174/pdf.worker.min.js';

        const state = {
            files: [],
            results: [],
            chart: null,
            isProcessing: false
        };

        // TF-IDF Implementation
        class TFIDF {
            constructor() {
                this.documents = [];
                this.vocab = new Map();
            }
            tokenize(text) {
                return text.toLowerCase()
                    .replace(/[^\w\s]/g, '')
                    .split(/\s+/)
                    .filter(w => w.length > 2);
            }
            addDocument(doc) {
                const tokens = this.tokenize(doc);
                this.documents.push(tokens);
            }
            calculateScore(query) {
                const queryTokens = this.tokenize(query);
                if (this.documents.length === 0) return 0;
                
                const docTokens = this.documents[this.documents.length - 1];
                let matches = 0;
                queryTokens.forEach(token => {
                    if (docTokens.includes(token)) matches++;
                });
                return (matches / queryTokens.length) * 100;
            }
        }

        // File Input Handler
        const fileInput = document.getElementById('fileInput');
        const browseBtn = document.getElementById('browseBtn');
        const uploadSection = document.getElementById('uploadSection');

        browseBtn.addEventListener('click', (e) => {
            e.preventDefault();
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e);
        });

        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('dragging');
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.classList.remove('dragging');
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('dragging');
            fileInput.files = e.dataTransfer.files;
            handleFiles({ target: { files: e.dataTransfer.files } });
        });

        function handleFiles(e) {
            const files = Array.from(e.target.files);
            console.log('Files selected:', files.length);
            
            files.forEach(file => {
                if (file.name.endsWith('.zip')) {
                    extractZip(file);
                } else if (file.type === 'application/pdf' || file.name.endsWith('.docx')) {
                    addFileToQueue(file);
                }
            });
            updateUI();
        }

        function addFileToQueue(file) {
            state.files.push({
                id: Math.random().toString(36),
                name: file.name,
                file: file,
                size: (file.size / 1024).toFixed(2),
                status: 'pending',
                result: null
            });
            console.log('File added:', file.name);
        }

        async function extractZip(zipFile) {
            try {
                const zip = await JSZip.loadAsync(zipFile);
                for (const [path, file] of Object.entries(zip.files)) {
                    if (!file.dir && (path.endsWith('.pdf') || path.endsWith('.docx'))) {
                        const blob = await file.async('blob');
                        const newFile = new File([blob], file.name, { type: blob.type });
                        addFileToQueue(newFile);
                    }
                }
                showToast(`Extracted ${state.files.length} files from ZIP`, 'success');
            } catch (err) {
                showToast('Failed to extract ZIP: ' + err.message, 'error');
            }
        }

        async function extractTextFromPDF(file) {
            const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
            let text = '';
            for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(item => item.str).join(' ') + '\n';
            }
            return text;
        }

        async function extractTextFromDocx(file) {
            const result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
            return result.value;
        }

        async function extractCVData(text) {
            const data = {
                name: 'Unknown',
                experience: '0 years',
                skills: [],
                rawText: text.substring(0, 500)
            };

            const nameMatch = text.match(/^([A-Za-z\s]{2,})/m);
            if (nameMatch) data.name = nameMatch[1].trim();

            const expMatch = text.match(/(\d+)\s*(?:year|tahun|yr)/i);
            if (expMatch) data.experience = expMatch[1] + ' years';

            const skillsMatch = text.match(/(?:skill|keahlian)[:\s]*([^,\n.]+(?:,[^,\n.]+)*)/i);
            if (skillsMatch) {
                data.skills = skillsMatch[1].split(',').map(s => s.trim()).slice(0, 3);
            }

            return data;
        }

        async function analyzeCV(fileObj) {
            try {
                fileObj.status = 'processing';
                updateUI();

                let text = '';
                if (fileObj.file.type === 'application/pdf') {
                    text = await extractTextFromPDF(fileObj.file);
                } else {
                    text = await extractTextFromDocx(fileObj.file);
                }

                const cvData = await extractCVData(text);
                const jobDesc = document.getElementById('jobDesc').value || text;

                const tfidf = new TFIDF();
                tfidf.addDocument(jobDesc);
                tfidf.addDocument(text);
                const score = tfidf.calculateScore(jobDesc);

                fileObj.result = {
                    ...cvData,
                    score: Math.round(score),
                    timestamp: new Date().toISOString()
                };

                state.results.push(fileObj.result);
                fileObj.status = 'success';

            } catch (err) {
                console.error(err);
                fileObj.status = 'error';
                showToast(`Error: ${err.message}`, 'error');
            }

            updateUI();
        }

        async function startProcessing() {
            if (state.files.length === 0) {
                showToast('No files to process', 'info');
                return;
            }

            state.isProcessing = true;
            updateUI();

            for (const file of state.files) {
                if (file.status === 'pending') {
                    await analyzeCV(file);
                }
            }

            state.isProcessing = false;
            updateChart();
            showToast('Analysis complete!', 'success');
            updateUI();
        }

        function updateUI() {
            document.getElementById('totalFiles').textContent = state.files.length;
            document.getElementById('processedCount').textContent = state.files.filter(f => f.status === 'success').length;
            
            const avgScore = state.results.length > 0
                ? (state.results.reduce((sum, r) => sum + r.score, 0) / state.results.length).toFixed(0)
                : 0;
            document.getElementById('avgScore').textContent = avgScore;

            const fileList = document.getElementById('fileList');
            fileList.innerHTML = state.files.map(f => `
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">${f.name}</div>
                        <div class="file-size">${f.size} KB</div>
                    </div>
                    <div class="file-status">
                        ${f.result ? `<span class="score-badge ${f.result.score >= 70 ? 'score-high' : f.result.score >= 40 ? 'score-medium' : 'score-low'}">${f.result.score}</span>` : ''}
                        <span class="status-badge status-${f.status}">${f.status}</span>
                    </div>
                </div>
            `).join('');

            const topCandidates = state.results.sort((a, b) => b.score - a.score).slice(0, 10);
            const tableBody = document.getElementById('candidateTable');
            tableBody.innerHTML = topCandidates.length > 0 ? topCandidates.map(r => `
                <tr>
                    <td><strong>${r.name}</strong></td>
                    <td><span class="score-badge ${r.score >= 70 ? 'score-high' : r.score >= 40 ? 'score-medium' : 'score-low'}">${r.score}</span></td>
                    <td>${r.experience}</td>
                    <td>${r.skills.map(s => `<span class="tag">${s}</span>`).join('')}</td>
                </tr>
            `).join('') : '<tr><td colspan="4" style="text-align: center; color: var(--color-text-secondary); padding: 40px;">No data yet</td></tr>';

            document.getElementById('startProcess').disabled = !state.files.length || state.isProcessing;
            document.getElementById('exportExcel').disabled = !state.results.length;
        }

        function updateChart() {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            const scores = state.results.map(r => r.score);
            const distribution = [
                scores.filter(s => s < 20).length,
                scores.filter(s => s >= 20 && s < 40).length,
                scores.filter(s => s >= 40 && s < 60).length,
                scores.filter(s => s >= 60 && s < 80).length,
                scores.filter(s => s >= 80).length
            ];

            if (state.chart) state.chart.destroy();

            state.chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['0-20', '20-40', '40-60', '60-80', '80-100'],
                    datasets: [{
                        label: 'Candidates',
                        data: distribution,
                        backgroundColor: '#10a37f'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        function exportToExcel() {
            const ws_data = state.results.map(r => ({
                Name: r.name,
                Score: r.score,
                Experience: r.experience,
                Skills: r.skills.join('; ')
            }));

            const ws = XLSX.utils.json_to_sheet(ws_data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'CVs');
            XLSX.writeFile(wb, `cv-analysis-${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.style.borderLeft = type === 'success' ? '4px solid #4ade80' : type === 'error' ? '4px solid #ef4444' : '4px solid #60a5fa';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Event Listeners
        document.getElementById('startProcess').addEventListener('click', startProcessing);
        document.getElementById('exportExcel').addEventListener('click', exportToExcel);

        // Initialize
        updateUI();
    </script>
</body>
</html>
