<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rexvin Strategic AI Auditor - 2026 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-[1600px] mx-auto space-y-6">
        <!-- HEADER & INPUT -->
        <div class="bg-white p-8 rounded-2xl shadow-md border border-slate-200">
            <div class="mb-6">
                <h1 class="text-3xl font-extrabold text-slate-900">REXVIN <span class="text-blue-700">STRATEGIC AUDITOR</span></h1>
                <p class="text-slate-500 italic">"AI tidak lagi sekadar mencocokkan kata, ia kini membedah DNA Industri."</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-4">
                    <input type="password" id="apiKey" class="w-full p-3 bg-slate-50 border rounded-xl" placeholder="API Key Groq">
                    <input type="file" id="fileInput" multiple class="w-full text-sm">
                </div>
                <div class="md:col-span-2">
                    <textarea id="jobDesc" rows="4" class="w-full p-3 bg-slate-50 border rounded-xl" placeholder="Tulis JD Anda. Gunakan kata 'WAJIB' untuk kriteria industri."></textarea>
                </div>
            </div>

            <button onclick="processFiles()" id="btnRun" class="mt-6 w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-xl transition-all">
                EKSEKUSI AUDIT KANDIDAT
            </button>
            
            <div id="progressBox" class="hidden mt-4">
                <div id="progressBar" class="bg-blue-600 h-1 w-0 transition-all"></div>
            </div>
        </div>

        <!-- RESULT TABLE -->
        <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-slate-200">
            <table class="w-full text-left">
                <thead class="bg-slate-900 text-white text-[11px] uppercase">
                    <tr>
                        <th class="p-4">Kandidat</th>
                        <th class="p-4 text-center">Usia (2026)</th>
                        <th class="p-4">Riwayat Perusahaan</th>
                        <th class="p-4 w-1/4">Analisa Strategis (The Truth)</th>
                        <th class="p-4 text-center">Rekomendasi</th>
                        <th class="p-4 text-center">Score</th>
                    </tr>
                </thead>
                <tbody id="resultTable" class="text-[12px] divide-y divide-slate-200"></tbody>
            </table>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function processFiles() {
            const apiKey = document.getElementById('apiKey').value;
            const jd = document.getElementById('jobDesc').value;
            const files = Array.from(document.getElementById('fileInput').files);
            if(!apiKey || !jd || files.length === 0) return alert("Data tidak lengkap!");

            document.getElementById('resultTable').innerHTML = "";
            document.getElementById('progressBox').classList.remove('hidden');

            for (let i = 0; i < files.length; i++) {
                try {
                    const text = files[i].name.endsWith('.pdf') ? await extractPDF(files[i]) : await extractDocx(files[i]);
                    const aiResult = await callGroq(apiKey, jd, text);
                    renderRow(aiResult);
                } catch (e) { console.error(e); }
            }
        }

        async function callGroq(key, jd, cv) {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { 
                            role: "system", 
                            content: `Anda adalah CHRO Rexvin Group yang sangat skeptis. 
                            Tugas: Memisahkan antara 'Orang Proyek Kontraktor' dan 'Orang Strategis Developer'.

                            ATURAN LOGIKA KETAT:
                            1. PERUSAHAAN ADALAH KUNCI: Cek nama tempat kerja kandidat. Jika mengandung 'Developer', 'Real Estate', 'Property', atau 'Land', kandidat ini memiliki DNA yang tepat. Berikan poin tinggi tanpa melihat judul posisi.
                            2. POSISI vs INDUSTRI: Judul 'Supervisor' di Developer (seperti PT Alfa Bumindo) JAUH LEBIH BERHARGA daripada 'Project Manager' di perusahaan konstruksi umum/kontraktor.
                            3. PENALTI KERAS: Jika kandidat HANYA berpengalaman di Kontraktor/Vendor, skor MAKSIMAL adalah 40%. Jangan berbelas kasihan.
                            4. USIA: Hitung usia untuk tahun 2026.
                            5. REKOMENDASI: Gunakan 'SANGAT DISARANKAN', 'DAPAT DIPERTIMBANGKAN', atau 'REJECT'.

                            Hasilkan JSON: {"name":"","usia":"","perusahaan":"","catatan":"","rekomendasi":"","score":0}` 
                        },
                        { role: "user", content: `JD Kriteria:\n${jd}\n\nCV Kandidat:\n${cv.substring(0, 7000)}` }
                    ],
                    response_format: { type: "json_object" }
                })
            });
            const data = await res.json();
            return JSON.parse(data.choices[0].message.content);
        }

        async function extractPDF(file) {
            const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
            let text = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ") + " ";
            }
            return text;
        }

        async function extractDocx(file) {
            const res = await mammoth.extractRawText({arrayBuffer: await file.arrayBuffer()});
            return res.value;
        }

        function renderRow(d) {
            const color = d.score >= 70 ? 'text-emerald-700 bg-emerald-50' : 'text-rose-700 bg-rose-50';
            const row = `
                <tr class="hover:bg-slate-50 transition-all">
                    <td class="p-4 font-bold text-slate-900">${d.name}</td>
                    <td class="p-4 text-center font-semibold">${d.usia}</td>
                    <td class="p-4 font-medium text-blue-800">${d.perusahaan}</td>
                    <td class="p-4 italic text-slate-600">${d.catatan}</td>
                    <td class="p-4 text-center"><span class="px-3 py-1 rounded-full font-bold text-[10px] ${color}">${d.rekomendasi}</span></td>
                    <td class="p-4 text-center font-black text-lg">${d.score}%</td>
                </tr>`;
            document.getElementById('resultTable').insertAdjacentHTML('beforeend', row);
        }
    </script>
</body>
</html>
