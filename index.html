<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Matcher Pro - Rexvin Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-black text-slate-800">CV <span class="text-blue-600">MATCHER PRO</span></h1>
                <p class="text-slate-500 text-sm">Sistem Skrining Batching & Audit Teks</p>
            </div>
            <div class="flex gap-3">
                <button onclick="exportToCSV()" id="btnExport" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold text-sm transition">
                    Download CSV (.csv)
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar Konfigurasi -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-800 mb-4 uppercase text-xs tracking-widest">Configuration</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">GROQ API KEY</label>
                            <input type="password" id="apiKey" class="w-full p-3 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="gsk_...">
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">JOB DESCRIPTION</label>
                            <textarea id="jobDesc" rows="6" class="w-full p-3 bg-slate-50 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Masukkan kriteria rekrutmen..."></textarea>
                        </div>

                        <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                            <h4 class="text-xs font-bold text-blue-700 mb-2 uppercase">Batch Settings (Auto)</h4>
                            <p class="text-[10px] text-blue-600 leading-relaxed">
                                • 5 CV per Batch<br>
                                • 10 Detik Jeda antar Batch<br>
                                • Mencegah Rate Limit Groq & Browser Crash
                            </p>
                        </div>

                        <div>
                            <input type="file" id="fileInput" multiple accept=".pdf,.docx" class="hidden">
                            <label for="fileInput" class="block w-full text-center cursor-pointer bg-slate-100 hover:bg-slate-200 border-2 border-dashed border-slate-300 p-6 rounded-xl transition">
                                <span class="block text-sm font-bold text-slate-700">Upload CV Masal</span>
                                <span id="fileCount" class="text-xs text-slate-500 italic mt-1">Belum ada file dipilih</span>
                            </label>
                        </div>

                        <button onclick="startBatchProcessing()" id="btnRun" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-100 transition duration-300 transform active:scale-95">
                            JALANKAN SCANNER
                        </button>
                    </div>
                </div>
            </div>

            <!-- Monitoring & Hasil -->
            <div class="lg:col-span-8 space-y-6">
                <!-- Status Progress -->
                <div id="progressBox" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-2">
                        <span id="statusLabel" class="text-sm font-bold text-blue-700 uppercase italic">Processing...</span>
                        <span id="progressText" class="text-sm font-mono font-bold">0 / 0</span>
                    </div>
                    <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-blue-600 h-full w-0 transition-all duration-500"></div>
                    </div>
                </div>

                <!-- Table -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden text-sm">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-400 font-bold text-[10px] uppercase">
                                <th class="p-4 border-b">Kandidat</th>
                                <th class="p-4 border-b text-center">Score</th>
                                <th class="p-4 border-b">Analisa Pola</th>
                                <th class="p-4 border-b">Audit Teks (Raw)</th>
                            </tr>
                        </thead>
                        <tbody id="resultTable" class="divide-y divide-slate-100">
                            <!-- Hasil muncul di sini -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let allResults = [];

        async function startBatchProcessing() {
            const apiKey = document.getElementById('apiKey').value;
            const jobDesc = document.getElementById('jobDesc').value;
            const files = Array.from(document.getElementById('fileInput').files);
            
            if (!apiKey || !jobDesc || files.length === 0) return alert("Lengkapi data!");

            // UI Reset
            allResults = [];
            document.getElementById('resultTable').innerHTML = "";
            document.getElementById('progressBox').classList.remove('hidden');
            document.getElementById('btnExport').classList.add('hidden');
            document.getElementById('btnRun').disabled = true;

            const batchSize = 5;
            const delay = 10000; // 10 Detik

            for (let i = 0; i < files.length; i += batchSize) {
                const batch = files.slice(i, i + batchSize);
                updateProgress(i, files.length, `Memproses Batch ${Math.floor(i/batchSize)+1}...`);

                await Promise.all(batch.map(async (file) => {
                    try {
                        let text = file.name.endsWith('.pdf') ? await extractPDF(file) : await extractDocx(file);
                        const result = await callGroq(apiKey, jobDesc, text);
                        renderRow(file.name, result, text.substring(0, 200) + "...");
                        allResults.push({ name: file.name, ...result });
                    } catch (e) {
                        console.error(e);
                        renderRow(file.name, {score: 0, summary: "Error pada file ini."}, "Gagal baca teks.");
                    }
                }));

                if (i + batchSize < files.length) {
                    updateProgress(i + batch.length, files.length, `Menunggu Jeda Batch (10s)...`);
                    await new Promise(r => setTimeout(r, delay));
                }
            }

            updateProgress(files.length, files.length, "Selesai!");
            document.getElementById('btnExport').classList.remove('hidden');
            document.getElementById('btnRun').disabled = false;
        }

        async function extractPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            let text = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ") + " ";
            }
            return text;
        }

        async function extractDocx(file) {
            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.extractRawText({arrayBuffer: arrayBuffer});
            return result.value;
        }

        async function callGroq(key, jd, cv) {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "Analisa CV vs JD. Balas JSON: {\"score\": 0-100, \"summary\": \"max 2 kalimat analisa strategis\"}" },
                        { role: "user", content: `JD: ${jd}\n\nCV: ${cv.substring(0, 6000)}` }
                    ],
                    response_format: { type: "json_object" }
                })
            });
            const data = await res.json();
            return JSON.parse(data.choices[0].message.content);
        }

        function renderRow(name, data, audit) {
            const table = document.getElementById('resultTable');
            const scoreClass = data.score > 80 ? 'bg-emerald-100 text-emerald-700' : (data.score > 50 ? 'bg-amber-100 text-amber-700' : 'bg-rose-100 text-rose-700');
            
            const row = `
                <tr class="hover:bg-slate-50 transition border-b border-slate-50">
                    <td class="p-4 font-bold text-slate-700">${name}</td>
                    <td class="p-4 text-center">
                        <span class="px-2 py-1 rounded-md text-xs font-black ${scoreClass}">${data.score}%</span>
                    </td>
                    <td class="p-4 text-slate-600 leading-relaxed text-xs">${data.summary}</td>
                    <td class="p-4">
                        <div class="text-[10px] text-slate-400 bg-slate-50 p-2 rounded border truncate w-40" title="${audit}">
                            ${audit}
                        </div>
                    </td>
                </tr>`;
            table.insertAdjacentHTML('beforeend', row);
        }

        function updateProgress(curr, total, label) {
            const percent = (curr / total) * 100;
            document.getElementById('progressBar').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${curr} / ${total}`;
            document.getElementById('statusLabel').innerText = label;
        }

        function exportToCSV() {
            let csv = "Nama Kandidat,Score,Analisa\n";
            allResults.forEach(r => {
                csv += `"${r.name}","${r.score}%","${r.summary.replace(/"/g, '""')}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `Hasil_Skrining_Rexvin_${new Date().getTime()}.csv`);
            a.click();
        }

        document.getElementById('fileInput').onchange = e => {
            document.getElementById('fileCount').innerText = `${e.target.files.length} file dipilih`;
        };
    </script>
</body>
</html>
